# ===========================================================================
# client.conf  -  Client Application configuration
# ---------------------------------------------------------------------------
# Passed to the client as a command-line argument:
#     ./client config/client.conf
#
# You can also override the current version and client name on the command
# line, which is handy for testing many clients at once:
#     ./client config/client.conf 2 clientA      # pretends to be on v2
# ===========================================================================

# Where the update server lives.
server_host = 127.0.0.1
port        = 9090

# The software version this client currently has "installed".
# (latest_version in server.conf is 5, so the default below is OUTDATED and
#  will trigger a download. Override with argv[2] to test up-to-date case.)
current_version = 2

# Where downloaded update packages are saved locally.
download_dir = client_storage

# Label used to identify this client in the logs.
client_name = client

# Where the client writes its log.
client_log_file = logs/client.log
