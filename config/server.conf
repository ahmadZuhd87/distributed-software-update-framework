# ===========================================================================
# server.conf  -  Update Server configuration
# ---------------------------------------------------------------------------
# Passed to the server as a command-line argument:
#     ./server config/server.conf
#
# Editing values here lets you change behaviour WITHOUT recompiling, which is
# exactly what the assignment asks for. Lines starting with '#' are comments.
# ===========================================================================

# TCP port the server listens on.
port = 9090

# The newest software version the server offers. A client reporting a lower
# version will be told to update; equal-or-higher is "up to date".
latest_version = 5

# Directory that holds the update package, and the package file name.
repo_dir    = server_repo
update_file = update_v5.bin

# Maximum pending connections in the listen() backlog queue.
backlog = 32

# Where the server writes its log.
log_file = logs/server.log
